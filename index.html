<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">

<title>Rosé Planner 🌸</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Dancing+Script:wght@600;700&display=swap');

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
:root{
  --bg:#fff5f8; --bg2:#ffeef4; --card:#fff; --card2:rgba(255,255,255,.85);
  --border:#f9b8d0; --border2:#fcd8e6; --pink:#e8749a; --pink-l:#f4a7c0; --pink-d:#c45a7e;
  --rose:#ff8fb1; --lilac:#d4a0c7; --mint:#b2dfdb; --peach:#ffb5a7;
  --text:#4a2535; --text2:#7a4a5e; --muted:#b08898; --green:#6dbf8d; --red:#e07070;
  --shadow:rgba(232,116,154,.18);
}
html,body{background:var(--bg);color:var(--text);font-family:'Nunito',system-ui,sans-serif;font-size:14px;min-height:100vh;overflow-x:hidden}
body{padding-bottom:calc(env(safe-area-inset-bottom) + 20px)}

#bg-decor{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;overflow:hidden}

@keyframes logo-flow{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
.logo{font-family:'Dancing Script',cursive;font-size:22px;font-weight:700;background:linear-gradient(90deg,#e8749a,#c45a7e,#d4a0c7,#e8b88a,#f4c8b0,#bf7fa0,#e8749a,#d4a0c7);background-size:400%;animation:logo-flow 6s ease infinite;-webkit-background-clip:text;background-clip:text;color:transparent;letter-spacing:1px}

#app-header{position:sticky;top:0;z-index:100;background:rgba(255,245,248,.92);border-bottom:1px solid var(--border2);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);padding:10px 15px 0;padding-top:calc(10px + env(safe-area-inset-top))}
.header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.header-acts{display:flex;gap:7px}
.hdr-btn{background:rgba(232,116,154,.1);border:1px solid var(--border);border-radius:20px;color:var(--pink);padding:5px 12px;font-size:10px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif}

.tabs{display:flex;overflow-x:auto;scrollbar-width:none;gap:2px;padding-bottom:1px}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:0 0 auto;padding:8px 14px;font-size:10px;font-weight:800;letter-spacing:.4px;text-transform:uppercase;color:var(--muted);border-bottom:2.5px solid transparent;cursor:pointer;white-space:nowrap;transition:all .2s;font-family:'Nunito',sans-serif}
.tab.active{color:var(--pink);border-color:var(--pink)}

.page-in-l{animation:pil .22s ease forwards}
.page-in-r{animation:pir .22s ease forwards}
@keyframes pil{from{opacity:0;transform:translateX(24px)}to{opacity:1;transform:none}}
@keyframes pir{from{opacity:0;transform:translateX(-24px)}to{opacity:1;transform:none}}

#app-content{padding:14px 14px 20px;position:relative;z-index:1}

.card{background:var(--card);border:1px solid var(--border2);border-radius:22px;padding:16px;margin-bottom:14px;box-shadow:0 4px 20px var(--shadow)}
.card.pink-card{background:linear-gradient(135deg,#fff,#fff5f8)}
.card.mint-card{background:linear-gradient(135deg,#f0faf8,#fff)}
.card.lilac-card{background:linear-gradient(135deg,#faf0fc,#fff)}
.card-title{font-family:'Dancing Script',cursive;font-size:18px;font-weight:700;color:var(--pink);margin-bottom:13px;display:flex;align-items:center;gap:7px}

.big{font-size:30px;font-weight:900;color:var(--pink);letter-spacing:-1px;line-height:1;font-family:'Nunito',sans-serif}
.big.ok{color:var(--green)}.big.warn{color:var(--peach)}.big.bad{color:var(--red)}

input[type="text"],input[type="number"],input[type="date"],select,textarea{width:100%;padding:11px 14px;background:#fff;border:1.5px solid var(--border2);border-radius:14px;color:var(--text);font-size:14px;outline:none;font-family:'Nunito',sans-serif;transition:border-color .2s;-webkit-appearance:none}
input:focus,select:focus{border-color:var(--pink)}
.lbl{display:block;font-size:10px;font-weight:800;color:var(--muted);margin-bottom:5px;letter-spacing:.5px;text-transform:uppercase}
.ig{margin-bottom:10px}

.btn{display:inline-flex;align-items:center;justify-content:center;padding:12px 20px;font-size:12px;font-weight:800;border-radius:30px;cursor:pointer;border:none;font-family:'Nunito',sans-serif;transition:all .2s;white-space:nowrap;letter-spacing:.3px}
.btn.p{background:linear-gradient(135deg,var(--pink),var(--pink-d));color:#fff;box-shadow:0 4px 14px rgba(232,116,154,.4)}
.btn.p2{background:rgba(232,116,154,.12);border:1.5px solid var(--border);color:var(--pink)}
.btn.li{background:rgba(212,160,199,.12);border:1.5px solid #e8d0f0;color:var(--lilac)}
.btn.g{background:rgba(109,191,141,.12);border:1.5px solid #b8e0c8;color:var(--green)}
.btn.full{width:100%;margin-top:10px}
.btn:disabled{opacity:.6;cursor:not-allowed}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}

.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}

.filter-chips{display:flex;gap:6px;flex-wrap:wrap;margin:10px 0}
.chip{padding:6px 12px;border-radius:20px;font-size:10px;font-weight:800;cursor:pointer;border:1.5px solid var(--border2);color:var(--muted);background:var(--bg2);transition:all .2s;font-family:'Nunito',sans-serif;white-space:nowrap}
.chip.on{background:linear-gradient(135deg,var(--pink-l),var(--pink));border-color:var(--pink);color:#fff;box-shadow:0 3px 10px rgba(232,116,154,.3)}
.custom-dates{display:flex;gap:8px;margin-bottom:10px}

.stat{background:var(--bg2);border:1px solid var(--border2);border-radius:16px;padding:12px;text-align:center}
.stat .v{font-size:17px;font-weight:900;color:var(--pink);margin-bottom:3px}
.stat .l{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;font-weight:700}

.prog-track{height:8px;background:var(--bg2);border-radius:99px;overflow:hidden;margin:7px 0 4px}
.prog-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--pink-l),var(--pink));transition:width .6s cubic-bezier(.4,0,.2,1)}
.prog-meta{display:flex;justify-content:space-between;font-size:10px;color:var(--muted);font-weight:600}

.log-row{padding:9px 2px;border-bottom:1px solid var(--border2);display:flex;justify-content:space-between;align-items:center;gap:8px}
.log-row:last-child{border-bottom:none}
.log-meta{font-size:10px;color:var(--muted);margin-top:2px}
.amt{font-size:13px;font-weight:800;white-space:nowrap}
.amt.i{color:var(--green)}.amt.e{color:var(--red)}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:9px;font-weight:800;background:rgba(232,116,154,.1);color:var(--pink);letter-spacing:.4px}
.del-btn{background:none;border:1.5px solid #f0c0c0;border-radius:10px;color:#f0a0a0;font-size:13px;padding:3px 9px;cursor:pointer;flex-shrink:0;line-height:1;font-family:'Nunito',sans-serif}

.b-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--border2);font-size:12px}
.b-row:last-child{border-bottom:none}
.b-key{color:var(--muted);font-size:11px;font-weight:600}
.b-val{font-weight:800;color:var(--text)}

.goal-mini{margin-bottom:13px}
.goal-mini-title{display:flex;justify-content:space-between;font-size:11px;margin-bottom:4px;align-items:center;font-weight:700}

.aligner-num{font-family:'Dancing Script',cursive;font-size:64px;font-weight:700;color:var(--pink);line-height:1;text-align:center}
.aligner-sub{text-align:center;font-size:11px;color:var(--muted);font-weight:600;margin-top:2px}
.aligner-badge{display:inline-flex;align-items:center;gap:5px;background:linear-gradient(135deg,var(--pink),var(--pink-d));color:#fff;padding:7px 16px;border-radius:22px;font-size:11px;font-weight:800;box-shadow:0 3px 12px rgba(232,116,154,.4)}
.notify-box{border-radius:16px;padding:12px;margin-bottom:10px;font-size:12px;line-height:1.65;font-weight:600}
.notify-box.warn{background:rgba(255,179,179,.1);border:1.5px solid rgba(224,112,112,.3);color:var(--red)}
.notify-box.pink{background:rgba(232,116,154,.07);border:1.5px solid var(--border2);color:var(--pink)}
.notify-box.ok{background:rgba(109,191,141,.08);border:1.5px solid rgba(109,191,141,.25);color:var(--green)}
.notify-box.info{background:rgba(212,160,199,.08);border:1.5px solid rgba(212,160,199,.3);color:var(--lilac)}
.pair-row{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-radius:12px;font-size:12px;margin-bottom:4px;font-weight:700;transition:all .15s}
.pair-row.done{background:rgba(109,191,141,.08);color:#5aaa7a}
.pair-row.done.partial{background:rgba(212,160,199,.1);color:var(--lilac)}
.pair-row.current{background:linear-gradient(90deg,rgba(232,116,154,.12),rgba(212,160,199,.1));color:var(--pink);border:1.5px solid var(--border)}
.pair-row.future{background:var(--bg2);color:var(--muted);font-weight:600}

.color-dot{width:26px;height:26px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .2s;flex-shrink:0;box-shadow:0 2px 6px rgba(0,0,0,.1)}
.color-dot.selected{border-color:var(--text);transform:scale(1.15)}

details{margin-top:8px}
details summary{font-size:11px;color:var(--muted);cursor:pointer;user-select:none;padding:5px 0;font-weight:700;list-style:none}
details summary::before{content:'›';margin-right:5px;display:inline-block;transition:transform .2s;color:var(--pink-l)}
details[open] summary::before{transform:rotate(90deg)}

.search-row{display:flex;gap:8px;margin-bottom:12px}
.search-row input{flex:1}
.search-row select{flex:0 0 auto;width:auto;min-width:110px}

.free-cash{margin-top:9px;font-size:11px;color:var(--green);background:rgba(109,191,141,.08);padding:8px 12px;border-radius:12px;border:1px solid rgba(109,191,141,.25);font-weight:700}

.canvas-wrap{border-radius:16px;overflow:hidden;background:var(--bg2);margin-top:8px}
.canvas-wrap canvas{display:block;width:100%}
.chart-legend{display:flex;flex-wrap:wrap;gap:6px 12px;margin-top:10px}
.chart-legend span{display:inline-flex;align-items:center;gap:5px;font-size:10px;color:var(--text2);font-weight:600}
.chart-legend .ld{display:inline-block;width:9px;height:9px;border-radius:3px;flex-shrink:0}

.bar-chart{display:flex;flex-direction:column;gap:6px;margin-top:8px}
.bar-row{display:flex;align-items:center;gap:8px}
.bar-label{width:38px;text-align:right;color:var(--muted);font-size:9px;font-weight:700;flex-shrink:0}
.bar-track{flex:1;height:14px;background:var(--bg2);border-radius:7px;overflow:hidden}
.bar-inc{height:100%;border-radius:7px;background:linear-gradient(90deg,rgba(109,191,141,.5),rgba(109,191,141,.8))}
.bar-exp{height:100%;border-radius:7px;background:linear-gradient(90deg,rgba(232,116,154,.4),rgba(232,116,154,.7));margin-top:2px}
.bar-val{width:70px;font-size:9px;flex-shrink:0;text-align:right;font-weight:700}
.bar-legend{display:flex;gap:14px;margin-bottom:8px;font-size:10px;font-weight:700}
.bar-legend span{display:flex;align-items:center;gap:5px}
.bar-legend .dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}

.hist-list{max-height:180px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.reminder{background:rgba(255,179,179,.08);border:1.5px solid rgba(224,112,112,.25);border-radius:16px;padding:11px;margin-bottom:10px;font-size:12px;color:var(--red);line-height:1.65;font-weight:600}

/* Стили для Списка покупок */
.shop-item { display:flex; align-items:center; justify-content:space-between; padding:10px 12px; border:1px solid var(--border2); border-radius:14px; background:var(--bg2); margin-bottom:8px; transition:all 0.2s; }
.shop-item.needed { background:linear-gradient(135deg, #fff, #fff5f8); border-color:var(--pink-l); }
.shop-item.bought { opacity: 0.6; text-decoration: line-through; background:rgba(109,191,141,.1); border-color:rgba(109,191,141,.3); }
.shop-item.mandatory { border-left: 4px solid var(--pink); }
.shop-content { display:flex; align-items: center; gap:10px; flex:1; min-width:0; }
.shop-text { font-size:13px; font-weight:700; color:var(--text); word-break: break-word; white-space: normal; }
.shop-check { width:22px; height:22px; border-radius:6px; border:2px solid var(--pink); display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0; background:#fff; transition:all 0.2s; }
.shop-check.checked { background:var(--pink); color:#fff; }
.shop-meta { font-size:9px; color:var(--pink-d); font-weight:800; text-transform:uppercase; letter-spacing:0.5px; margin-top:2px; }
.qty-ctrl { display:flex; align-items:center; gap:4px; }
.qty-ctrl button { width:22px; height:22px; border-radius:50%; border:1px solid var(--border); background:#fff; font-weight:800; font-size:14px; line-height:1; padding:0; cursor:pointer; display:flex; align-items:center; justify-content:center; color:var(--pink); }
.qty-ctrl .qty-val { font-weight:800; font-size:13px; min-width:18px; text-align:center; color:var(--text); }
</style>
</head>

<script>
'use strict';

/* ═══════════════════════════════════
   КОНФИГ
═══════════════════════════════════ */
const DB_NAME = 'RosePlannerV1';
const DB_VER  = 4;
const S = { TX:'transactions', CFG:'settings', GOALS:'goals', ALIGNERS:'aligners', SHOP:'shopping' };

const ALIGNER_START = new Date('2026-03-12T22:00:00');
const ALIGNER_INTERVAL_DAYS = 14;
const ALIGNER_UPPER_TOTAL = 26;
const ALIGNER_LOWER_TOTAL = 23;
const ALIGNER_CHANGE_HOUR = 22; 

const DEFAULTS = {
  balance: 0, monthlyBudgetCap: 30000,
  alignerCurrentPair: 1,
  alignerLastConfirmedDate: '2026-03-12',
};

const CAT_EXP = ['Еда 🍽','Быт 🏠','Маркетплейсы 🛍','Развлечения 🎉','Уход за собой 💅','Здоровье 💊','Аренда 🏡','Коммуналка 💡','WiFi 📶','Моб. интернет 📱','Налог 📋','Другое ✨'];
const CAT_INC = ['Зарплата 💸','Другое ✨'];
const GOAL_COLORS = ['#e8749a','#d4a0c7','#ff8fb1','#ffb5a7','#6dbf8d','#79b8f5','#f4c430','#c45a7e'];

/* ═══════════════════════════════════
   INDEXEDDB
═══════════════════════════════════ */
class DB {
  constructor(){ this.ready = this._open(); }
  _open(){
    return new Promise((res,rej)=>{
      const req = indexedDB.open(DB_NAME, DB_VER);
      req.onupgradeneeded = e => {
        const db = e.target.result;
        const mk = (n,opts,idx=[])=>{
          if(!db.objectStoreNames.contains(n)){
            const st=db.createObjectStore(n,opts);
            idx.forEach(([a,b])=>st.createIndex(a,b));
          }
        };
        mk(S.TX,    {keyPath:'id',autoIncrement:true},[['date','date'],['category','category']]);
        mk(S.CFG,   {keyPath:'key'});
        mk(S.GOALS, {keyPath:'id',autoIncrement:true});
        mk(S.ALIGNERS,{keyPath:'id',autoIncrement:true},[['pair','pair']]);
        mk(S.SHOP,  {keyPath:'id',autoIncrement:true});
      };
      req.onsuccess = e => { this.db=e.target.result; this._seed().then(res).catch(rej); };
      req.onerror   = e => rej(e.target.error);
    });
  }
  async _seed(){
    for(const [k,v] of Object.entries(DEFAULTS)){
      if(await this.get(S.CFG,k)===null) await this.set(S.CFG,{key:k,value:v});
    }
    const existing = await this.all(S.ALIGNERS);
    const doneKey = new Set(existing.map(p=>p.pair+'_'+p.type));
    const seedData = [
      {pair:1,type:'upper',confirmedAt:'2026-03-12T19:00:00.000Z',note:'Первая капа'},
      {pair:1,type:'lower',confirmedAt:'2026-03-12T19:00:00.000Z',note:'Первая капа'},
      {pair:2,type:'upper',confirmedAt:'2026-03-25T19:00:00.000Z',note:''},
      {pair:2,type:'lower',confirmedAt:'2026-03-25T19:00:00.000Z',note:''},
      {pair:3,type:'upper',confirmedAt:'2026-04-08T19:00:00.000Z',note:''},
      {pair:3,type:'lower',confirmedAt:'2026-04-08T19:00:00.000Z',note:''},
    ];
    for(const p of seedData){
      if(!doneKey.has(p.pair+'_'+p.type)) await this.add(S.ALIGNERS,p);
    }
  }
  _st(n,m='readonly'){return this.db.transaction(n,m).objectStore(n);}
  get(s,k){return new Promise((r,e)=>{const q=this._st(s).get(k);q.onsuccess=()=>r(q.result!==undefined?q.result:null);q.onerror=()=>e(q.error);});}
  set(s,o){return new Promise((r,e)=>{const q=this._st(s,'readwrite').put(o);q.onsuccess=()=>r();q.onerror=()=>e(q.error);});}
  add(s,o){return new Promise((r,e)=>{const q=this._st(s,'readwrite').add(o);q.onsuccess=()=>r(q.result);q.onerror=()=>e(q.error);});}
  all(s){return new Promise((r,e)=>{const q=this._st(s).getAll();q.onsuccess=()=>r(q.result||[]);q.onerror=()=>e(q.error);});}
  del(s,k){return new Promise((r,e)=>{const q=this._st(s,'readwrite').delete(k);q.onsuccess=()=>r();q.onerror=()=>e(q.error);});}
  async cfg(k){const r=await this.get(S.CFG,k);return r!==null?r.value:DEFAULTS[k];}
  async setCfg(k,v){await this.set(S.CFG,{key:k,value:v});}
}

/* ═══════════════════════════════════
   УТИЛИТЫ
═══════════════════════════════════ */
const fmt   = n => Number(n||0).toLocaleString('ru-RU',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtI  = n => Number(n||0).toLocaleString('ru-RU');
const dStr  = d => new Date(d).toLocaleDateString('ru-RU');
const today = () => new Date().toISOString().split('T')[0];

function confirmDel(btn,cb){
  if(btn._c){cb();return;}
  btn._c=true; const orig=btn.textContent;
  btn.textContent='✓?'; btn.style.cssText+=';color:#e07070;border-color:#e07070';
  btn.onclick=()=>{btn._ok=true;cb();};
  setTimeout(()=>{if(!btn._ok){btn._c=false;btn.textContent=orig;btn.style.color='';btn.style.borderColor='';btn.onclick=()=>confirmDel(btn,cb);}},3000);
}

const ALIGNER_PAIR2_BASE  = new Date(2026, 2, 25, 22, 0, 0); 
const ALIGNER_INTERVAL_MS = 14 * 86400000;
const ALIGNER_BTN_LEAD_MS = 2 * 3600000; 

function getAlignerSchedule(){
  const schedule = [];
  schedule.push({pair:1, date:new Date(2026,2,12,22,0,0)});
  schedule.push({pair:2, date:new Date(2026,2,25,22,0,0)});
  const maxPair = Math.max(ALIGNER_UPPER_TOTAL, ALIGNER_LOWER_TOTAL);
  for(let n=3; n<=maxPair; n++){
    const d = new Date(ALIGNER_PAIR2_BASE.getTime() + (n-2)*ALIGNER_INTERVAL_MS);
    schedule.push({pair:n, date:d});
  }
  return schedule;
}

function getAlignerStatus(schedule){
  const now = new Date();
  let wearingPair = 1, wearingEntry = schedule[0];
  for(const s of schedule){
    if(now >= s.date){ wearingPair = s.pair; wearingEntry = s; }
  }
  const nextPair  = wearingPair + 1;
  const nextEntry = schedule.find(s=>s.pair===nextPair)||null;
  const btnAvailAt = nextEntry ? new Date(nextEntry.date.getTime()-ALIGNER_BTN_LEAD_MS) : null;
  const isBtnVisible = btnAvailAt ? now >= btnAvailAt : false;
  const isOverdue    = nextEntry ? now > nextEntry.date : false;
  let msTillNext = nextEntry ? nextEntry.date - now : null;
  if(msTillNext!==null && msTillNext<0) msTillNext=0;
  const daysLeft  = msTillNext!==null ? Math.max(0,Math.floor(msTillNext/86400000)) : null;
  const hoursLeft = msTillNext!==null ? Math.max(0,Math.floor((msTillNext%86400000)/3600000)) : null;
  const minsLeft  = msTillNext!==null ? Math.max(0,Math.floor((msTillNext%3600000)/60000)) : null;
  return {wearingPair, wearingEntry, nextPair, nextEntry, isBtnVisible, isOverdue, daysLeft, hoursLeft, minsLeft};
}

async function requestNotifPerms(){
  if(!('Notification' in window)) return false;
  if(Notification.permission==='granted') return true;
  const p = await Notification.requestPermission();
  return p==='granted';
}

// Новая функция — отправляет сообщение в Service Worker для планирования уведомлений
function scheduleAlignerNotif(nextDate) {
  if (!('serviceWorker' in navigator) || !navigator.serviceWorker.controller) return;
  const at20 = new Date(nextDate.getTime() - ALIGNER_BTN_LEAD_MS).getTime();
  const at22 = new Date(nextDate).getTime();
  navigator.serviceWorker.controller.postMessage({
    action: 'scheduleAlignerNotifs',
    at20,
    at22
  });
}

const TABS = ['finance','shopping','goals','aligners','stats'];

class App {
  constructor(){
    this.db = new DB();
    this.tab = 'finance';
    this.statsStart = null; this.statsEnd = null;
    this._swipeDir = null;
    this._incFilter = 'month';
    this._incCustomS = null; this._incCustomE = null;
    this._incOpen = false;
    this._schedShowAll = false;
    this.db.ready.then(()=>this._init()).catch(e=>console.error('[Rosé]',e));
  }
  _init(){
    document.getElementById('tabs').addEventListener('click',e=>{
      const t=e.target.dataset.tab; if(!t||t===this.tab) return;
      const oi=TABS.indexOf(this.tab),ni=TABS.indexOf(t);
      this._swipeDir=ni>oi?'left':'right';
      this.tab=t;
      document.querySelectorAll('.tab').forEach(el=>el.classList.toggle('active',el.dataset.tab===t));
      this._scrollTab(t);
      this._render();
    });
    document.getElementById('exp-btn').onclick=()=>this._export();
    document.getElementById('imp-file').onchange=e=>this._import(e.target.files[0]);
    this._initSwipe();
    this._render();
    requestNotifPerms();
    const info = getAlignerStatus(getAlignerSchedule());
    if(info.nextEntry) scheduleAlignerNotif(info.nextEntry.date);

    // Регистрация Service Worker и планировщик бэкапов
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js', { scope: '/' })
        .then(reg => {
          console.log('SW registered', reg);
          navigator.serviceWorker.addEventListener('message', event => {
            if (event.data && event.data.action === 'backup-now') {
              this._export(true);
            }
          });
          // Если SW контроллер готов, сразу отправляем расписание элайнеров
          if (navigator.serviceWorker.controller) {
            const alignerInfo = getAlignerStatus(getAlignerSchedule());
            if (alignerInfo.nextEntry) scheduleAlignerNotif(alignerInfo.nextEntry.date);
          }
          this._scheduleBackupReminder();
        })
        .catch(err => console.warn('SW registration failed', err));
    }

    // Если приложение открыто по уведомлению бэкапа — запускаем сохранение
    if (new URLSearchParams(location.search).has('backup')) {
      setTimeout(() => {
        this._export(true);
        if (history.replaceState) {
          const url = new URL(location);
          url.searchParams.delete('backup');
          history.replaceState(null, '', url);
        }
      }, 1000);
    }

    // Дополнительная проверка: не пропущена ли замена, пока приложение было закрыто
    const checkInfo = getAlignerStatus(getAlignerSchedule());
    if (checkInfo.nextEntry && new Date() >= checkInfo.nextEntry.date) {
      if (Notification.permission === 'granted') {
        new Notification('🦷 Rosé Planner', {
          body: 'Время менять элайнеры на следующую пару! 🦷',
          icon: 'icon.svg',
          tag: 'rose-aligner'
        });
      }
    }
  }
  _scrollTab(t){
    const el=document.querySelector(`.tab[data-tab="${t}"]`);
    if(el) el.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
  }
  _initSwipe(){
    const el=document.getElementById('app-content');
    let sx=0,sy=0,moved=false;
    el.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;sy=e.touches[0].clientY;moved=false;},{passive:true});
    el.addEventListener('touchmove',e=>{const dx=Math.abs(e.touches[0].clientX-sx),dy=Math.abs(e.touches[0].clientY-sy);if(dx>dy&&dx>10)moved=true;},{passive:true});
    el.addEventListener('touchend',e=>{
      if(!moved)return;
      const dx=e.changedTouches[0].clientX-sx,dy=e.changedTouches[0].clientY-sy;
      if(Math.abs(dx)<55||Math.abs(dx)<Math.abs(dy)*1.4)return;
      const cur=TABS.indexOf(this.tab);let next=-1;
      if(dx<0&&cur<TABS.length-1)next=cur+1;
      if(dx>0&&cur>0)next=cur-1;
      if(next<0)return;
      this._swipeDir=dx<0?'left':'right';
      this.tab=TABS[next];
      document.querySelectorAll('.tab').forEach(el=>el.classList.toggle('active',el.dataset.tab===this.tab));
      this._scrollTab(this.tab); this._render();
    },{passive:true});
  }
  _render(){
    const c=document.getElementById('app-content'); c.innerHTML='';
    const wrap=document.createElement('div');
    if(this._swipeDir==='left') wrap.className='page-in-l';
    else if(this._swipeDir==='right') wrap.className='page-in-r';
    this._swipeDir=null; c.appendChild(wrap);
    const map={
      finance:()=>this._finance(wrap),
      shopping:()=>this._shopping(wrap),
      goals:()=>this._goals(wrap),
      aligners:()=>this._aligners(wrap),
      stats:()=>this._stats(wrap)
    };
    (map[this.tab]||map.finance)();
  }
  _card(extra=''){const el=document.createElement('div');el.className='card'+extra;return el;}

  async _finance(c){

    const txs=await this.db.all(S.TX);
    const goals=(await this.db.all(S.GOALS)).filter(g=>g.active);
    const now=new Date(), todayStr=today();
    const mStart=new Date(now.getFullYear(),now.getMonth(),1);
    const dInM=new Date(now.getFullYear(),now.getMonth()+1,0).getDate();
    const dRem=Math.max(1,dInM-now.getDate()+1);

    const isGoal=t=>t.type==='expense'&&t.category==='Цель';
    const spentMonth=txs.filter(t=>t.type==='expense'&&new Date(t.date)>=mStart&&!isGoal(t)).reduce((s,t)=>s+t.amount,0);

    const sorted=[...txs].sort((a,b)=>new Date(b.date)-new Date(a.date));
    const histCard=this._card();
    histCard.innerHTML=`<div class="card-title">📋 История</div>
      <div class="search-row"><input type="text" id="tx-q" placeholder="🔍 Поиск..."><select id="tx-fc"><option value="">Все</option>${[...CAT_EXP,...CAT_INC,'Цель'].map(x=>`<option value="${x}">${x}</option>`).join('')}</select></div>
      <div id="tx-list"></div>`;
    c.appendChild(histCard);
    const renderList=(q='',fc='')=>{
      let fil=sorted;
      if(q) fil=fil.filter(t=>(t.comment||'').toLowerCase().includes(q)||t.category.toLowerCase().includes(q));
      if(fc) fil=fil.filter(t=>t.category===fc);
      const listEl=histCard.querySelector('#tx-list'); listEl.innerHTML='';
      if(!fil.length){listEl.innerHTML='<div style="color:var(--muted);text-align:center;padding:16px;font-weight:600">Записей нет ✨</div>';return;}
      fil.slice(0,30).forEach(tx=>{
        const row=document.createElement('div'); row.className='log-row';
        const del=document.createElement('button'); del.className='del-btn'; del.textContent='×';
        row.innerHTML=`<div style="min-width:0;flex:1"><span class="badge">${tx.category}</span><div class="log-meta">${dStr(tx.date)}${tx.comment?' · '+tx.comment:''}</div></div><div style="display:flex;align-items:center;gap:8px;flex-shrink:0"><span class="amt ${tx.type==='income'?'i':'e'}">${tx.type==='income'?'+':'−'}${fmt(tx.amount)} ₽</span></div>`;
        row.querySelector('div:last-child').appendChild(del);
        del.onclick=()=>confirmDel(del,async()=>{del._ok=true;await this.db.del(S.TX,tx.id);let bal=await this.db.cfg('balance');await this.db.setCfg('balance',tx.type==='income'?bal-tx.amount:bal+tx.amount);this._render();});
        listEl.appendChild(row);
      });
    };
    renderList();
    let st; histCard.querySelector('#tx-q').oninput=e=>{clearTimeout(st);st=setTimeout(()=>renderList(e.target.value.toLowerCase(),histCard.querySelector('#tx-fc').value),200);};
    histCard.querySelector('#tx-fc').onchange=e=>renderList(histCard.querySelector('#tx-q').value.toLowerCase(),e.target.value);
  }

  _renderIncomePanel(panel, txs) {
    const now = new Date();
    const f = this._incFilter || 'month';
    let s0, e0;
    if (f === 'today') { s0 = new Date(now.getFullYear(), now.getMonth(), now.getDate()); e0 = new Date(s0.getTime() + 86400000 - 1); }
    else if (f === 'month') { s0 = new Date(now.getFullYear(), now.getMonth(), 1); e0 = new Date(now.getFullYear(), now.getMonth() + 1, 0, 23, 59, 59); }
    else if (f === 'year') { s0 = new Date(now.getFullYear(), 0, 1); e0 = new Date(now.getFullYear(), 11, 31, 23, 59, 59); }
    else if (f === 'all') { s0 = new Date(0); e0 = new Date(9999, 0, 1); }
    else if (f === 'custom' && this._incCustomS && this._incCustomE) { s0 = new Date(this._incCustomS + 'T00:00:00'); e0 = new Date(this._incCustomE + 'T23:59:59'); }
    else { s0 = new Date(now.getFullYear(), now.getMonth(), 1); e0 = new Date(now.getFullYear(), now.getMonth() + 1, 0, 23, 59, 59); }

    const incTxs = txs.filter(t => { const d = new Date(t.date); return t.type === 'income' && d >= s0 && d <= e0; });
    const total = incTxs.reduce((s, t) => s + t.amount, 0);

    const incomeSpan = document.getElementById('income-total-amount');
    if (incomeSpan) incomeSpan.innerHTML = `+${fmt(total)} ₽`;

    const chips = [{ id: 'today', l: 'Сегодня' }, { id: 'month', l: 'Месяц' }, { id: 'year', l: 'Год' }, { id: 'all', l: 'Всё время' }, { id: 'custom', l: 'Свой период' }];
    let html = `<div class="filter-chips">${chips.map(ch => `<div class="chip${f === ch.id ? ' on' : ''}" data-f="${ch.id}">${ch.l}</div>`).join('')}</div>`;
    if (f === 'custom') html += `<div class="custom-dates"><input type="date" id="ics" value="${this._incCustomS || today()}"><input type="date" id="ice" value="${this._incCustomE || today()}"></div>`;
    panel.innerHTML = html;

    panel.querySelectorAll('.chip').forEach(el => {
      el.onclick = () => {
        this._incFilter = el.dataset.f;
        if (el.dataset.f !== 'custom') { this._incCustomS = null; this._incCustomE = null; }
        this._renderIncomePanel(panel, txs);
      };
    });
    const ics = panel.querySelector('#ics'), ice = panel.querySelector('#ice');
    if (ics) ics.oninput = () => { this._incCustomS = ics.value; if (this._incCustomE) this._renderIncomePanel(panel, txs); };
    if (ice) ice.oninput = () => { this._incCustomE = ice.value; if (this._incCustomS) this._renderIncomePanel(panel, txs); };
  }

          <div><div style="font-size:15px;font-weight:900;color:${col}">${goal.name}</div>
          <div style="font-size:10px;color:var(--muted);margin-top:2px;font-weight:600">Приоритет ${'★'.repeat(goal.priority||1)}${'☆'.repeat(3-(goal.priority||1))} · до ${dStr(goal.deadline)}</div></div>

        <div class="prog-meta"><span>${pct.toFixed(1)}%</span><span style="color:${dLeft<0?'var(--red)':'inherit'}">${dLeft>0?dLeft+' дн.':'⏰ Срок истёк'}</span></div>
        <div style="font-size:11px;color:var(--muted);margin-top:8px;line-height:1.8;font-weight:600">
          Нужно/мес: <b style="color:var(--peach)">${fmt(needPM)} ₽</b>
          · Откладываю: <b style="color:${col}">${fmtI(goal.monthlyAllocation||0)} ₽/мес</b>

        <details style="margin-top:10px">
          <summary>📜 История пополнений (${goalTxs.length})</summary>
          <div class="hist-list" style="margin-top:8px">
            ${goalTxs.length===0?'<div style="color:var(--muted);font-size:11px;text-align:center;padding:10px;font-weight:600">Пополнений нет</div>':
              [...goalTxs].sort((a,b)=>new Date(b.date)-new Date(a.date)).map(tx=>`

            <div class="ig"><label class="lbl">Приоритет</label><select id="ge-p-${goal.id}">
              <option value="1" ${goal.priority===1?'selected':''}>1 — Важная</option>
              <option value="2" ${goal.priority===2?'selected':''}>2 — Средняя</option>
              <option value="3" ${goal.priority===3?'selected':''}>3 — Когда-нибудь</option>
            </select></div>
            <div class="ig"><label class="lbl">Цвет</label><div id="ge-cols-${goal.id}" style="display:flex;gap:6px;flex-wrap:wrap;margin-top:5px">

      gc.querySelectorAll(`#ge-cols-${goal.id} .color-dot`).forEach(el=>{el.onclick=()=>{gc.querySelectorAll(`#ge-cols-${goal.id} .color-dot`).forEach(x=>x.classList.remove('selected'));el.classList.add('selected');selColor=el.dataset.col;};});

      gc.querySelector(`#ge-s-${goal.id}`).onclick=async()=>{
        await this.db.set(S.GOALS,{...goal,
          name:gc.querySelector(`#ge-n-${goal.id}`).value.trim()||goal.name,
          targetAmount:parseFloat(gc.querySelector(`#ge-t-${goal.id}`).value)||goal.targetAmount,
          deadline:gc.querySelector(`#ge-d-${goal.id}`).value||goal.deadline,
          monthlyAllocation:parseFloat(gc.querySelector(`#ge-a-${goal.id}`).value)||0,
          priority:parseInt(gc.querySelector(`#ge-p-${goal.id}`).value)||1,
          color:selColor});
        this._render();
      };

      gc.querySelector(`#ga-${goal.id}`).onclick=async()=>{
        const amt=parseFloat(gc.querySelector(`#gp-${goal.id}`).value);
        if(!amt||amt<=0) return;
        await this.db.add(S.TX,{amount:amt,type:'expense',category:'Цель',comment:goal.name,date:new Date().toISOString()});
        const bal=await this.db.cfg('balance'); await this.db.setCfg('balance',bal-amt);
        this._render();

    const nc=this._card(' lilac-card');
    let newColor=GOAL_COLORS[0];

      <div class="ig"><label class="lbl">💖 Мечта / цель</label><input id="ng-n" style="border-color: var(--pink-l); box-shadow: 0 0 10px rgba(232,116,154,0.25);" placeholder="Путешествие, телефон, курс..."></div>
      <div class="g2">
        <div class="ig"><label class="lbl">Сумма (₽)</label><input type="number" id="ng-t" placeholder="50000"></div>
        <div class="ig"><label class="lbl">Дедлайн</label><input type="date" id="ng-d" value="2026-12-31"></div>
        <div class="ig"><label class="lbl">₽/мес</label><input type="number" id="ng-a" placeholder="5000"></div>
        <div class="ig"><label class="lbl">Важность</label><select id="ng-p"><option value="1">⭐⭐⭐ Главная</option><option value="2" selected>⭐⭐ Средняя</option><option value="3">⭐ Не срочно</option></select></div>
      </div>
      <div class="ig"><label class="lbl">Цвет</label><div id="ng-cols" style="display:flex;gap:7px;flex-wrap:wrap;margin-top:5px">${GOAL_COLORS.map((cl,i)=>`<div class="color-dot${i===0?' selected':''}" data-col="${cl}" style="background:${cl}"></div>`).join('')}</div></div>
      <button class="btn p full" id="ng-add">🌸 Создать цель</button>`;

      await this.db.add(S.GOALS,{name,targetAmount:target,deadline:nc.querySelector('#ng-d').value,priority:parseInt(nc.querySelector('#ng-p').value)||2,monthlyAllocation:parseFloat(nc.querySelector('#ng-a').value)||0,color:newColor,active:true});
      this._render();

  /* ═══ ALIGNERS ═══ */
  async _aligners(c){
    const schedule       = getAlignerSchedule();
    const confirmedPairs = await this.db.all(S.ALIGNERS);
    const now            = new Date();

    const confUSet = new Set(confirmedPairs.filter(p=>p.type==='upper').map(p=>p.pair));
    const confLSet = new Set(confirmedPairs.filter(p=>p.type==='lower').map(p=>p.pair));
    const maxConfU = confUSet.size>0?Math.max(...confUSet):0;
    const maxConfL = confLSet.size>0?Math.max(...confLSet):0;

    const st = getAlignerStatus(schedule);
    const {wearingPair, wearingEntry, nextPair, nextEntry, isBtnVisible, isOverdue, daysLeft, hoursLeft, minsLeft} = st;

    const upperDone = Math.min(maxConfU,ALIGNER_UPPER_TOTAL);
    const lowerDone = Math.min(maxConfL,ALIGNER_LOWER_TOTAL);
    const upperPct  = Math.round((upperDone/ALIGNER_UPPER_TOTAL)*100);
    const lowerPct  = Math.round((lowerDone/ALIGNER_LOWER_TOTAL)*100);

    const needConfirmU = !confUSet.has(wearingPair);
    const needConfirmL = !confLSet.has(wearingPair);
    const pairConfirmed = !needConfirmU && !needConfirmL;

    let timeStr='';
    if(daysLeft!==null){
      if(daysLeft>0) timeStr=daysLeft+' дн. '+hoursLeft+' ч.';
      else if(hoursLeft>0) timeStr=hoursLeft+' ч. '+minsLeft+' мин.';
      else if(minsLeft>0) timeStr=minsLeft+' мин.';
      else timeStr='Прямо сейчас!';
    }

    const ac = this._card(' pink-card');
    ac.innerHTML=`<div class="card-title">🦷 Элайнеры</div>
      <div style="text-align:center;margin-bottom:16px">
        <div style="font-size:11px;color:var(--muted);font-weight:700;margin-bottom:4px;letter-spacing:.5px">ТЕКУЩАЯ ПАРА</div>
        <div class="aligner-num">${wearingPair}</div>
        <div class="aligner-sub">из ${ALIGNER_UPPER_TOTAL} верхних / ${ALIGNER_LOWER_TOTAL} нижних</div>
        ${nextEntry?`<div style="margin-top:12px"><span class="aligner-badge">🕙 Следующая замена: ${dStr(nextEntry.date)} в 22:00</span></div>`:`<div style="margin-top:12px"><span class="aligner-badge" style="background:linear-gradient(135deg,var(--green),#4a9e6d)">🎉 Все пройдены!</span></div>`}
        ${timeStr?`<div style="font-size:11px;color:var(--muted);margin-top:8px;font-weight:600">Осталось: <b style="color:var(--pink)">${timeStr}</b></div>`:''}
      </div>
      <div style="display:flex;justify-content:space-between;font-size:11px;font-weight:700;margin-bottom:4px">
        <span>🦷 Верхние</span><span style="color:var(--pink)">${upperDone} / ${ALIGNER_UPPER_TOTAL} (${upperPct}%)</span>
      </div>
      <div class="prog-track"><div class="prog-fill" style="width:${upperPct}%"></div></div>
      <div style="display:flex;justify-content:space-between;font-size:11px;font-weight:700;margin:10px 0 4px">
        <span>🦷 Нижние</span><span style="color:var(--lilac)">${lowerDone} / ${ALIGNER_LOWER_TOTAL} (${lowerPct}%)</span>
      </div>
      <div class="prog-track"><div class="prog-fill" style="width:${lowerPct}%;background:linear-gradient(90deg,var(--lilac),var(--pink-d))"></div></div>`;

    if(pairConfirmed && nextEntry){
      const isTodayChange = nextEntry.date.toDateString()===now.toDateString();
      const before20 = now < new Date(nextEntry.date.getTime()-ALIGNER_BTN_LEAD_MS);
      if(isTodayChange && before20){
        ac.insertAdjacentHTML('beforeend',`<div class="notify-box pink" style="margin-top:14px">🌸 Сегодня день замены! С 20:00 появится кнопка подтверждения. Надевай пару ${nextPair} в 22:00 🕙</div>`);
      } else if(isTodayChange && !before20){
        // next pair confirm button logic handled below
      } else {
        ac.insertAdjacentHTML('beforeend',`<div class="notify-box ok" style="margin-top:14px">✅ Пара ${wearingPair} установлена! Следующая смена — ${dStr(nextEntry.date)} в 22:00 🌸</div>`);
      }
    } else if(!pairConfirmed){
      const nowAfterWearingStart = now >= wearingEntry.date;
      if(nowAfterWearingStart){
        ac.insertAdjacentHTML('beforeend',`<div class="notify-box warn" style="margin-top:14px">⚠️ Пара ${wearingPair} ещё не подтверждена! Подтверди её ниже 👇</div>`);
      } else {
        ac.insertAdjacentHTML('beforeend',`<div class="notify-box info" style="margin-top:14px">ℹ️ Ношение пары ${wearingPair} начнётся ${dStr(wearingEntry.date)} в 22:00</div>`);
      }
    }

    const todayIsNextChangeDay = nextEntry && nextEntry.date.toDateString()===now.toDateString();
    const isAfter20ForNext = nextEntry && now >= new Date(nextEntry.date.getTime()-ALIGNER_BTN_LEAD_MS);
    const needConfNextU = nextEntry ? !confUSet.has(nextPair) : false;
    const needConfNextL = nextEntry ? !confLSet.has(nextPair) : false;
    const showNextConfirm = pairConfirmed && todayIsNextChangeDay && isAfter20ForNext && (needConfNextU||needConfNextL);

    const showConfirmCurrent = !pairConfirmed && now >= wearingEntry.date;

    if(showConfirmCurrent){
      const confPair = wearingPair;
      ac.insertAdjacentHTML('beforeend',`<div style="background:rgba(232,116,154,.06);border:1.5px solid var(--border);border-radius:18px;padding:14px;margin-top:14px">
        <div style="font-size:11px;color:var(--text2);font-weight:800;margin-bottom:10px;text-align:center">Подтверди — пара ${confPair} надета:</div>
        <div class="btn-row" style="justify-content:center">
          ${needConfirmU?`<button class="btn p" id="conf-upper">🔼 Верхние надела</button>`:'<button class="btn g" disabled style="font-size:11px">✅ Верхние ок</button>'}
          ${needConfirmL?`<button class="btn li" id="conf-lower">🔽 Нижние надела</button>`:'<button class="btn g" disabled style="font-size:11px">✅ Нижние ок</button>'}
        </div>
      </div>`);
    } else if(showNextConfirm){
      ac.insertAdjacentHTML('beforeend',`<div style="background:rgba(232,116,154,.06);border:1.5px solid var(--border);border-radius:18px;padding:14px;margin-top:14px">
        <div style="font-size:11px;color:var(--text2);font-weight:800;margin-bottom:10px;text-align:center">Подтверди — пара ${nextPair} надета:</div>
        <div class="btn-row" style="justify-content:center">
          ${needConfNextU?`<button class="btn p" id="conf-upper-n">🔼 Верхние надела</button>`:'<button class="btn g" disabled style="font-size:11px">✅ Верхние ок</button>'}
          ${needConfNextL?`<button class="btn li" id="conf-lower-n">🔽 Нижние надела</button>`:'<button class="btn g" disabled style="font-size:11px">✅ Нижние ок</button>'}
        </div>
      </div>`);
    }

    c.appendChild(ac);

    const doConfirm = async (btn, pair, type) => {
      if(!btn || btn.disabled) return;
      btn.disabled = true;
      btn.innerHTML = '⏳ Сохраняю...';
      await this.db.add(S.ALIGNERS,{pair,type,confirmedAt:new Date().toISOString(),note:''});
      if(Notification.permission==='granted') new Notification('🦷 Отлично!',{body:`${type==='upper'?'Верхние':'Нижние'} элайнеры пары ${pair} подтверждены 🌸`,icon:'icon.svg'});
      if(nextEntry) scheduleAlignerNotif(nextEntry.date);
      this._render();
    };

    const cU  = ac.querySelector('#conf-upper');
    const cL  = ac.querySelector('#conf-lower');
    const cUn = ac.querySelector('#conf-upper-n');
    const cLn = ac.querySelector('#conf-lower-n');
    
    if(cU)  cU.onclick  = ()=>doConfirm(cU, wearingPair,'upper');
    if(cL)  cL.onclick  = ()=>doConfirm(cL, wearingPair,'lower');
    if(cUn) cUn.onclick = ()=>doConfirm(cUn, nextPair,'upper');
    if(cLn) cLn.onclick = ()=>doConfirm(cLn, nextPair,'lower');

    if(Notification.permission!=='granted'){
      const nCard=this._card();
      nCard.innerHTML=`<div class="card-title">🔔 Уведомления</div>
        <div style="font-size:12px;color:var(--text2);margin-bottom:12px;font-weight:600;line-height:1.6">Разреши уведомления — Rosé Planner напомнит в <b>20:00</b> (за 2 часа) и в <b>22:00</b> в день замены 🌸</div>
        <button class="btn p full" id="req-notif">🔔 Разрешить уведомления</button>`;
      c.appendChild(nCard);
      nCard.querySelector('#req-notif').onclick=async()=>{
        const ok=await requestNotifPerms();
        if(ok&&nextEntry) scheduleAlignerNotif(nextEntry.date);
        this._render();
      };
    }

    const showAll = this._schedShowAll||false;
    const schedCard=this._card();
    schedCard.innerHTML=`<div class="card-title">📅 Расписание замен</div>`;
    const maxShow = showAll ? schedule.length : Math.min(schedule.length, wearingPair+5);
    for(let i=0;i<maxShow;i++){
      const s=schedule[i]; if(!s) continue;
      const isPast=s.pair<wearingPair, isCurr=s.pair===wearingPair;
      const cu=confUSet.has(s.pair), cl=confLSet.has(s.pair);
      let cls=isCurr?'current':isPast?'done':'future';
      if(isPast&&!(cu&&cl)) cls='done partial';
      const icon=cu&&cl?'✅':cu?'🔼':cl?'🔽':isCurr?'🌸':isPast?'⚪':'⏳';
      let pInfo=`Пара ${s.pair}`;
      if(s.pair<=ALIGNER_UPPER_TOTAL&&s.pair<=ALIGNER_LOWER_TOTAL) pInfo+=' (верх. + ниж.)';
      else if(s.pair<=ALIGNER_UPPER_TOTAL) pInfo+=' (только верхние)';
      else pInfo+=' (только нижние)';
      const canConfirm = (isPast || isCurr) && (!cu || !cl) && now >= s.date;
      const confirmBtnHtml = canConfirm ? 
        `<button class="btn p2" style="padding:2px 8px; font-size:9px; margin-left:6px;" data-action="confirm-pair" data-pair="${s.pair}" data-type="${!cu?'upper':'lower'}">✔</button>` : '';
      schedCard.insertAdjacentHTML('beforeend',`<div class="pair-row ${cls}"><span>${icon} ${pInfo}${confirmBtnHtml}</span><span style="font-size:10px">${dStr(s.date)}</span></div>`);
    }
    if(schedule.length>wearingPair+5){
      schedCard.insertAdjacentHTML('beforeend',`<div style="text-align:center;margin-top:10px"><button class="btn p2" id="sched-more" style="font-size:10px;padding:6px 16px">${showAll?'▲ Свернуть':'▼ Показать все ('+schedule.length+' пар)'}</button></div>`);
      schedCard.querySelector('#sched-more').onclick=()=>{this._schedShowAll=!this._schedShowAll;this._render();};
    }

    schedCard.addEventListener('click', async (e) => {
      const btn = e.target.closest('button[data-action="confirm-pair"]');
      if(!btn) return;
      const pair = parseInt(btn.dataset.pair);
      const type = btn.dataset.type;
      btn.disabled = true;
      btn.textContent = '...';
      await this.db.add(S.ALIGNERS,{pair, type, confirmedAt: new Date().toISOString(), note:''});
      this._render();
    });

    c.appendChild(schedCard);

    if(confirmedPairs.length>0){
      const histCard=this._card();
      histCard.innerHTML=`<div class="card-title">📜 История подтверждений</div>`;
      const grouped={};
      confirmedPairs.forEach(p=>{if(!grouped[p.pair])grouped[p.pair]={pair:p.pair,upper:null,lower:null};grouped[p.pair][p.type]=p.confirmedAt;});
      Object.values(grouped).sort((a,b)=>b.pair-a.pair).forEach(g=>{
        histCard.insertAdjacentHTML('beforeend',`<div class="log-row"><div style="min-width:0;flex:1"><div style="font-weight:800;color:var(--pink)">Пара ${g.pair}</div><div class="log-meta">${g.upper?'🔼 Верх: '+dStr(g.upper):''}${g.lower?' · 🔽 Низ: '+dStr(g.lower):''}</div></div><span style="color:var(--green);font-size:18px">${g.upper&&g.lower?'✓':'½'}</span></div>`);
      });
      c.appendChild(histCard);
    }

    const tipCard=this._card();
    tipCard.innerHTML=`<div class="card-title">💡 Памятка</div>
      <div style="font-size:12px;color:var(--text2);line-height:1.8;font-weight:600">
        🦷 Меняй каждые <b>2 недели в 22:00</b> (перед сном)<br>
        🔔 Кнопка появляется с <b>20:00</b> в день замены (за 2 часа)<br>
        📅 Всего: <b>${ALIGNER_UPPER_TOTAL} верхних</b> и <b>${ALIGNER_LOWER_TOTAL} нижних</b> пар<br>
        🧼 Чисти зубы и полоскай капы перед установкой<br>
        💧 Носи не менее <b>20–22 часов</b> в сутки
      </div>`;
    c.appendChild(tipCard);
  }

  /* ═══ STATS ═══ */
  async _stats(c){
    const txs=await this.db.all(S.TX);
    const now=new Date();
    if(!this.statsStart){
      const s=new Date(now);s.setDate(now.getDate()-30);
      this.statsStart=s.toISOString().split('T')[0];
      this.statsEnd=now.toISOString().split('T')[0];
    }

    const pCard=this._card();
    pCard.innerHTML=`<div class="card-title">📅 Период</div>
      <div class="g2" style="margin-bottom:10px">
        <div class="ig"><label class="lbl">От</label><input type="date" id="as" value="${this.statsStart}"></div>
        <div class="ig"><label class="lbl">До</label><input type="date" id="ae" value="${this.statsEnd}"></div>
      </div>
      <button class="btn p" id="ap">Применить ✓</button>
      <div class="btn-row" style="margin-top:8px">
        <button class="btn p2" id="qt">Сегодня</button>
        <button class="btn p2" id="qm">Месяц</button>
        <button class="btn p2" id="qy">Год</button>
        <button class="btn p2" id="qa">Всё</button>
      </div>`;
    c.appendChild(pCard);
    const upd=(s,e)=>{this.statsStart=s;this.statsEnd=e;this._render();};
    pCard.querySelector('#ap').onclick=()=>{const s=pCard.querySelector('#as').value,e=pCard.querySelector('#ae').value;if(s&&e&&s<=e)upd(s,e);};
    pCard.querySelector('#qt').onclick=()=>{const t=today();upd(t,t);};
    pCard.querySelector('#qm').onclick=()=>upd(new Date(now.getFullYear(),now.getMonth(),1).toISOString().split('T')[0],new Date(now.getFullYear(),now.getMonth()+1,0).toISOString().split('T')[0]);
    pCard.querySelector('#qy').onclick=()=>upd(`${now.getFullYear()}-01-01`,`${now.getFullYear()}-12-31`);
    pCard.querySelector('#qa').onclick=()=>{
      if(!txs.length){upd(today(),today());return;}
      const s=[...txs].sort((a,b)=>new Date(a.date)-new Date(b.date));
      upd(s[0].date.split('T')[0],today());
    };

    const s0=new Date(this.statsStart),e0=new Date(this.statsEnd);e0.setHours(23,59,59,999);
    const pTxs=txs.filter(t=>{const d=new Date(t.date);return d>=s0&&d<=e0;});
    const totalInc=pTxs.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
    const totalExp=pTxs.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
    const saldo=totalInc-totalExp;

    const sumCard=this._card(' pink-card');
    sumCard.innerHTML=`<div class="card-title">✨ Итоги</div>
      <div class="g3">
        <div class="stat"><div class="v" style="color:var(--green)">+${fmtI(totalInc)}</div><div class="l">Доходы ₽</div></div>
        <div class="stat"><div class="v" style="color:var(--red)">−${fmtI(totalExp)}</div><div class="l">Расходы ₽</div></div>
        <div class="stat"><div class="v" style="color:${saldo>=0?'var(--green)':'var(--red)'}">${saldo>=0?'+':''}${fmtI(saldo)}</div><div class="l">Сальдо ₽</div></div>
      </div>`;
    c.appendChild(sumCard);

    const monthlyData={};
    txs.forEach(t=>{
      const d=new Date(t.date);
      const key=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
      if(!monthlyData[key])monthlyData[key]={inc:0,exp:0};
      if(t.type==='income')monthlyData[key].inc+=t.amount;
      else monthlyData[key].exp+=t.amount;
    });
    const months=Object.keys(monthlyData).sort().slice(-9);
    if(months.length>0){
      const barCard=this._card();
      barCard.innerHTML='<div class="card-title">📊 Доходы vs Расходы</div>';
      const maxV=Math.max(...months.map(m=>Math.max(monthlyData[m].inc,monthlyData[m].exp)),1);
      const bLeg=`<div class="bar-legend"><span><div class="dot" style="background:rgba(109,191,141,.7)"></div>Доходы</span><span><div class="dot" style="background:rgba(232,116,154,.6)"></div>Расходы</span></div>`;
      let bh='<div class="bar-chart">';
      months.forEach(m=>{
        const d=monthlyData[m];
        const iw=Math.round((d.inc/maxV)*100),ew=Math.round((d.exp/maxV)*100);
        bh+=`<div class="bar-row"><div class="bar-label">${m.substring(5)}/${m.substring(2,4)}</div><div style="flex:1"><div class="bar-track"><div class="bar-inc" style="width:${iw}%"></div></div><div class="bar-track" style="margin-top:2px"><div class="bar-exp" style="width:${ew}%"></div></div></div><div class="bar-val"><div style="color:var(--green);font-size:9px">+${fmtI(Math.round(d.inc))}</div><div style="color:var(--red);font-size:9px">−${fmtI(Math.round(d.exp))}</div></div></div>`;
      });
      bh+='</div>';
      barCard.insertAdjacentHTML('beforeend',bLeg+bh);
      c.appendChild(barCard);
    }

    const expByCat={};
    pTxs.filter(t=>t.type==='expense'&&t.category!=='Цель').forEach(t=>{expByCat[t.category]=(expByCat[t.category]||0)+t.amount;});
    const cats=Object.keys(expByCat).sort((a,b)=>expByCat[b]-expByCat[a]);
    const vals=cats.map(k=>expByCat[k]);
    const totalE=vals.reduce((s,v)=>s+v,0)||1;
    const COLORS=['#e8749a','#d4a0c7','#ff8fb1','#ffb5a7','#6dbf8d','#79b8f5','#f4c430','#c45a7e','#a8d8a8','#f9c74f'];

    const pieCard=this._card();
    pieCard.innerHTML='<div class="card-title">🛍 Расходы по категориям</div>';
    if(!cats.length){pieCard.insertAdjacentHTML('beforeend','<div style="color:var(--muted);text-align:center;padding:16px;font-weight:600">Нет расходов за период ✨</div>');}
    else {
      const wrap=document.createElement('div');wrap.className='canvas-wrap';
      const cv=document.createElement('canvas');cv.width=420;cv.height=220;
      wrap.appendChild(cv);pieCard.appendChild(wrap);
      const leg=document.createElement('div');leg.className='chart-legend';
      cats.forEach((cat,i)=>{leg.insertAdjacentHTML('beforeend',`<span><span class="ld" style="background:${COLORS[i%COLORS.length]}"></span>${cat}: ${fmt(vals[i])} ₽ (${((vals[i]/totalE)*100).toFixed(1)}%)</span>`);});
      pieCard.appendChild(leg);
      requestAnimationFrame(()=>{
        const ctx=cv.getContext('2d'),W=cv.width,H=cv.height,cx=W/2,cy=H/2,R=Math.min(cx,cy)-8;
        let a=-Math.PI/2;ctx.clearRect(0,0,W,H);
        vals.forEach((v,i)=>{
          const sw=(v/totalE)*2*Math.PI;
          ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,R,a,a+sw);ctx.closePath();
          ctx.fillStyle=COLORS[i%COLORS.length];ctx.fill();
          ctx.strokeStyle='rgba(255,245,248,.8)';ctx.lineWidth=2;ctx.stroke();a+=sw;
        });
        ctx.beginPath();ctx.arc(cx,cy,R*.46,0,2*Math.PI);ctx.fillStyle='rgba(255,245,248,.97)';ctx.fill();
        ctx.textAlign='center';ctx.textBaseline='middle';
        ctx.fillStyle='#e8749a';ctx.font='bold 13px Nunito,sans-serif';
        ctx.fillText(fmtI(Math.round(totalE))+' ₽',cx,cy-8);
        ctx.fillStyle='rgba(176,136,152,.7)';ctx.font='11px Nunito,sans-serif';
        ctx.fillText('расходы',cx,cy+10);
      });
    }
    c.appendChild(pieCard);

    const sorted=[...pTxs].sort((a,b)=>new Date(a.date)-new Date(b.date));
    const pts=[];let run=0;
    sorted.forEach(t=>{run=t.type==='income'?run+t.amount:run-t.amount;pts.push(run);});
    if(pts.length>=2){
      const lCard=this._card();lCard.innerHTML='<div class="card-title">📈 Динамика баланса</div>';
      const lw=document.createElement('div');lw.className='canvas-wrap';
      const lc=document.createElement('canvas');lc.width=420;lc.height=130;
      lw.appendChild(lc);lCard.appendChild(lw);c.appendChild(lCard);
      requestAnimationFrame(()=>{
        const ctx=lc.getContext('2d'),W=lc.width,H=lc.height,n=pts.length;
        const minY=Math.min(...pts),maxY=Math.max(...pts),rng=maxY-minY||1;
        const px=14,py=16;
        const toX=i=>px+(i/(n-1))*(W-px*2);
        const toY=v=>H-py-((v-minY)/rng)*(H-py*2);
        ctx.clearRect(0,0,W,H);
        const gr=ctx.createLinearGradient(0,0,0,H);gr.addColorStop(0,'rgba(232,116,154,.18)');gr.addColorStop(1,'rgba(232,116,154,0)');
        ctx.beginPath();ctx.moveTo(toX(0),toY(pts[0]));pts.forEach((v,i)=>ctx.lineTo(toX(i),toY(v)));
        ctx.lineTo(toX(n-1),H);ctx.lineTo(toX(0),H);ctx.closePath();ctx.fillStyle=gr;ctx.fill();
        ctx.beginPath();ctx.strokeStyle='#e8749a';ctx.lineWidth=2.5;ctx.lineJoin='round';
        pts.forEach((v,i)=>i===0?ctx.moveTo(toX(i),toY(v)):ctx.lineTo(toX(i),toY(v)));ctx.stroke();
        pts.forEach((v,i)=>{ctx.beginPath();ctx.arc(toX(i),toY(v),3,0,2*Math.PI);ctx.fillStyle='#e8749a';ctx.fill();ctx.strokeStyle='#fff';ctx.lineWidth=1.5;ctx.stroke();});
        ctx.fillStyle='rgba(176,136,152,.8)';ctx.font='10px Nunito,sans-serif';
        ctx.textAlign='left';ctx.textBaseline='top';ctx.fillText('↑ '+fmt(maxY)+' ₽',4,2);
        ctx.textBaseline='bottom';ctx.fillText('↓ '+fmt(minY)+' ₽',4,H-2);
      });
    }
  }

  /* ═══ EXPORT / IMPORT ═══ */
  _scheduleBackupReminder() {
    const BACKUP_DAY = 0; // воскресенье
    const BACKUP_HOUR = 20;
    const BACKUP_MIN = 0;

    const scheduleNext = () => {
      const now = new Date();
      const next = new Date(now);
      next.setDate(now.getDate() + ((BACKUP_DAY + 7 - now.getDay()) % 7));
      next.setHours(BACKUP_HOUR, BACKUP_MIN, 0, 0);
      if (next <= now) next.setDate(next.getDate() + 7);
      const ms = next - now;
      if (ms > 0 && ms < 7 * 86400000) {
        setTimeout(() => {
          if (Notification.permission === 'granted') {
            navigator.serviceWorker.ready.then(reg => {
              reg.showNotification('🌸 Rosé Planner', {
                body: 'Пора сделать резервную копию! Нажми на уведомление, чтобы сохранить бэкап.',
                icon: 'icon.svg',
                badge: 'icon.svg',
                tag: 'rose-backup-weekly',
                requireInteraction: true,
                vibrate: [200, 100, 200]
              });
            });
          }
          scheduleNext();
        }, ms);
      }
    };

    scheduleNext();
  }

  async _export(forceDownload = false){
    const data = {
      version: 1,
      exportedAt: new Date().toISOString(),
      transactions: await this.db.all(S.TX),
      goals: await this.db.all(S.GOALS),
      aligners: await this.db.all(S.ALIGNERS),
      settings: await this.db.all(S.CFG),
      shopping: await this.db.all(S.SHOP)
    };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const filename = `rose-planner-backup-${today()}.json`;

    const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
    if (isIOS) {
      if (confirm('Резервная копия готова! Нажмите «ОК», чтобы скачать файл (откроется новое окно, сохраните его вручную).')) {
        window.open(url, '_blank');
      }
      return;
    }

    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
  }

  async _import(file){
    if(!file)return;
    const text=await file.text();let data;
    try{data=JSON.parse(text);}catch{alert('Неверный файл 🌸');return;}
    if(!confirm(`Загрузить бэкап от ${data.exportedAt||'?'}?\nВсе данные заменятся!`))return;
    const map={transactions:S.TX,goals:S.GOALS,aligners:S.ALIGNERS,settings:S.CFG,shopping:S.SHOP};
    for(const [k,sn] of Object.entries(map)){
      if(!data[k])continue;
      const ex=await this.db.all(sn);
      for(const o of ex)await this.db.del(sn,o.key||o.id);
      for(const o of data[k])await this.db.add(sn,o);
    }
    this._render(); alert('Данные восстановлены ✨');
  }
}
new App();
</script>
